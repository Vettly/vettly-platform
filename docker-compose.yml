services:

  postgres:
    image: postgres:16
    container_name: vettly-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: vettly_auth
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vettly-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./services
      dockerfile: auth-service/Dockerfile
    container_name: vettly-auth
    ports:
      - "5050:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=vettly_auth;Username=postgres;Password=${POSTGRES_PASSWORD}
      - Jwt__SecretKey=${JWT_SECRET}
      - Jwt__Issuer=vettly-auth-service
      - Jwt__Audience=vettly-platform
      - Jwt__AccessTokenExpirationMinutes=15
      - Jwt__RefreshTokenExpirationDays=1
      - Redis__ConnectionString=redis:6379
      - Cors__AllowedOrigins__0=${CORS_ALLOWED_ORIGIN}
      - OAuth__Google__ClientId=${GOOGLE_CLIENT_ID}
      - OAuth__Google__ClientSecret=${GOOGLE_CLIENT_SECRET}
      - OAuth__GitHub__ClientId=${GITHUB_CLIENT_ID}
      - OAuth__GitHub__ClientSecret=${GITHUB_CLIENT_SECRET}
      - Frontend__BaseUrl=${FRONTEND_BASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  candidate-service:
    build:
      context: ./services
      dockerfile: candidate-service/Dockerfile
    container_name: vettly-candidate
    ports:
      - "5051:8080"
    environment:
      - ConnectionStrings__CandidateDb=Host=postgres;Database=vettly_candidate;Username=postgres;Password=${POSTGRES_PASSWORD}
      - Jwt__SecretKey=${JWT_SECRET}
      - Jwt__Issuer=vettly-auth-service
      - Jwt__Audience=vettly-platform
      - R2__AccountId=${R2_ACCOUNT_ID}
      - R2__AccessKey=${R2_ACCESS_KEY}
      - R2__SecretKey=${R2_SECRET_KEY}
      - R2__BucketName=${R2_BUCKET_NAME}
      - R2__PublicUrl=${R2_PUBLIC_URL}
      - Cors__AllowedOrigins__0=${CORS_ALLOWED_ORIGIN}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data: